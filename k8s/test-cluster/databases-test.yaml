# 1. PostgreSQL: Validation Database Store
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-test
  namespace: peptiprompt-validation
  labels:
    app: postgres-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-test
  template:
    metadata:
      labels:
        app: postgres-test
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: peptiprompt
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        resources:
          limits:
            cpu: "250m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: peptiprompt-validation
spec:
  ports:
  - port: 5432
  selector:
    app: postgres-test
---
# 2. ZooKeeper: Validation Kafka Coordinator
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper-test
  namespace: peptiprompt-validation
  labels:
    app: zookeeper-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper-test
  template:
    metadata:
      labels:
        app: zookeeper-test
    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.4.0
        ports:
        - containerPort: 2181
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: peptiprompt-validation
spec:
  ports:
  - port: 2181
  selector:
    app: zookeeper-test
---
# 3. Apache Kafka: Validation Messaging Broker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-test
  namespace: peptiprompt-validation
  labels:
    app: kafka-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-test
  template:
    metadata:
      labels:
        app: kafka-test
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.4.0
        ports:
        - containerPort: 9092
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper:2181"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
          value: "1"
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: peptiprompt-validation
spec:
  ports:
  - port: 9092
  selector:
    app: kafka-test
---
# 4. Neo4j: Pathway Graph Database Test Instance
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j-test
  namespace: peptiprompt-validation
  labels:
    app: neo4j-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j-test
  template:
    metadata:
      labels:
        app: neo4j-test
    spec:
      containers:
      - name: neo4j
        image: neo4j:5.12-community
        ports:
        - containerPort: 7474
        - containerPort: 7687
        env:
        - name: NEO4J_AUTH
          value: neo4j/admin1234
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: peptiprompt-validation
spec:
  ports:
  - name: http
    port: 7474
    targetPort: 7474
  - name: bolt
    port: 7687
    targetPort: 7687
  selector:
    app: neo4j-test
---
# 5. Qdrant: Vector Embeddings Test Instance
apiVersion: apps/v1
kind: Deployment
