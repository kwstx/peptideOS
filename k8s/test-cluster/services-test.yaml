# 4. Pathway Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pathway-service
  namespace: peptiprompt-validation
  labels:
    app: pathway-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pathway-service
  template:
    metadata:
      labels:
        app: pathway-service
    spec:
      containers:
      - name: pathway
        image: peptiprompt/pathway:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8002
        env:
        - name: NEO4J_URI
          value: "bolt://neo4j:7687"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "150m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: pathway
  namespace: peptiprompt-validation
spec:
  ports:
  - port: 8002
    targetPort: 8002
  selector:
    app: pathway-service
---
