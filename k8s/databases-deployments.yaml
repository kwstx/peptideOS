apiVersion: v1
kind: Namespace
metadata:
  name: peptiprompt
  labels:
    istio-injection: enabled # Enable Istio Sidecar Injection for mTLS mesh
---
# PostgreSQL: Relational Metadata Store
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: peptiprompt
  labels:
    app: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_DB
          value: peptiprompt
        - name: POSTGRES_USER
          value: postgres
        - name: POSTGRES_PASSWORD
          value: postgres
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: peptiprompt
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
---
# Neo4j: Graph Database for Pathway Relationships
apiVersion: apps/v1
kind: Deployment
metadata:
  name: neo4j
  namespace: peptiprompt
  labels:
    app: neo4j
spec:
  replicas: 1
  selector:
    matchLabels:
      app: neo4j
  template:
    metadata:
      labels:
        app: neo4j
    spec:
      containers:
      - name: neo4j
        image: neo4j:5.12-community
        ports:
        - containerPort: 7474 # HTTP
        - containerPort: 7687 # Bolt
        env:
        - name: NEO4J_AUTH
          value: neo4j/admin1234
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: neo4j
  namespace: peptiprompt
spec:
  ports:
  - name: http
    port: 7474
    targetPort: 7474
  - name: bolt
    port: 7687
    targetPort: 7687
  selector:
    app: neo4j
---
# Qdrant: Vector Embeddings Repository
apiVersion: apps/v1
kind: Deployment
metadata:
  name: qdrant
  namespace: peptiprompt
  labels:
    app: qdrant
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qdrant
  template:
    metadata:
      labels:
        app: qdrant
    spec:
      containers:
      - name: qdrant
        image: qdrant/qdrant:v1.6.1
        ports:
        - containerPort: 6333 # REST API
        - containerPort: 6334 # gRPC
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: qdrant
  namespace: peptiprompt
spec:
  ports:
  - name: rest
    port: 6333
  - name: grpc
    port: 6334
  selector:
    app: qdrant
---
# ZooKeeper (Kafka Coordinator)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zookeeper
  namespace: peptiprompt
  labels:
    app: zookeeper
spec:
  replicas: 1
  selector:
    matchLabels:
      app: zookeeper
  template:
    metadata:
      labels:
        app: zookeeper
    spec:
      containers:
      - name: zookeeper
        image: confluentinc/cp-zookeeper:7.4.0
        ports:
        - containerPort: 2181
        env:
        - name: ZOOKEEPER_CLIENT_PORT
          value: "2181"
        - name: ZOOKEEPER_TICK_TIME
          value: "2000"
---
apiVersion: v1
kind: Service
metadata:
  name: zookeeper
  namespace: peptiprompt
spec:
  ports:
  - port: 2181
  selector:
    app: zookeeper
---
# Apache Kafka Message Broker
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka
  namespace: peptiprompt
  labels:
    app: kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:7.4.0
        ports:
        - containerPort: 9092
        env:
        - name: KAFKA_BROKER_ID
          value: "1"
        - name: KAFKA_ZOOKEEPER_CONNECT
          value: "zookeeper:2181"
        - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
          value: "PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
        - name: KAFKA_ADVERTISED_LISTENERS
          value: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092"
        - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:
          value: "1"
        resources:
          limits:
            cpu: "1"
            memory: "1Gi"
          requests:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: peptiprompt
spec:
  ports:
  - port: 9092
  selector:
    app: kafka
