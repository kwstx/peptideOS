# 4. Pathway Service (Neo4j Graph Database Query Service)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pathway-service
  namespace: peptiprompt
  labels:
    app: pathway-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pathway-service
  template:
    metadata:
      labels:
        app: pathway-service
    spec:
      containers:
      - name: pathway
        image: peptiprompt/pathway:latest
        ports:
        - containerPort: 8002
        env:
        - name: NEO4J_URI
          value: "bolt://neo4j:7687"
        livenessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8002
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: "300m"
            memory: "256Mi"
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: pathway-service
  namespace: peptiprompt
spec:
  ports:
  - port: 8002
    targetPort: 8002
  selector:
    app: pathway-service
---
