name: PeptideOS CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-benchmarks:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Cache Pip Packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libssl-dev

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install CPU version of PyTorch to speed up CI execution
        pip install torch --index-url https://download.pytorch.org/whl/cpu
        # Install remaining service dependencies
        pip install psycopg2-binary scikit-learn scipy cryptography confluent-kafka pytest

    - name: Run CI Benchmark Tests
      run: |
        python -m unittest discover -s tests -p "test_*.py"

    - name: Run Containerized Integration Tests
      run: |
        docker compose -f docker-compose.test.yml up --build --exit-code-from test-harness

